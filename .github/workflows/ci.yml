name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only — no backend extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Byte-compile all modules
        run: python -m compileall -q src tests benchmark.py demo.py

      - name: Offline test suite (framework-agnostic runner)
        run: python tests/test_smoke.py

      - name: Offline suite is pytest-discoverable
        run: pytest -q tests/test_smoke.py
        # live tests (tests/test_live.py) self-skip without RUN_LIVE and need
        # backend servers, so they are intentionally not run in CI.
